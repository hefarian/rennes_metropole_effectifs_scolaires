# =============================================================================
# P13 — Estimation des effectifs scolaires (Rennes Métropole)
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPORT: ${POSTGRES_CONTAINER_PORT:-5432} # <-- INDIQUE À POSTGRES DE CHANGER DE PORT INTERNE
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # ON AJOUTE LE PORT -p ICI POUR QUE LE TEST VERIFIE LE BON PORT
      test: ["CMD-SHELL", "pg_isready -p ${POSTGRES_CONTAINER_PORT:-5432} -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - p13_network
    profiles:
      - postgres

  etl:
    build:
      context: .
      dockerfile: docker/Dockerfile.etl
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_etl
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATA_DIR: /data
    volumes:
      - ./DATA:/data:ro
      - ./src:/app/src:ro
      - ./database/scripts:/app/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - p13_network
    profiles:
      - etl

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_api
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MODELS_DIR: /app/models
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      # Assurez-vous que votre application lit bien cette variable pour écouter sur le bon port !
      PORT: ${API_CONTAINER_PORT:-8000} 
    ports:
      - "${API_HOST_PORT:-8000}:${API_CONTAINER_PORT:-8000}"
    volumes:
      - ./src:/app/src:ro
      - ./models:/app/models
      - mlruns_data:/app/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Utilisation de python3 pour tester dynamiquement le port configuré (18000 en recette)
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_CONTAINER_PORT:-8000}/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p13_network
    profiles:
      - api

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_streamlit
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_URL: http://api:${API_CONTAINER_PORT:-8000}
    ports:
      - "${STREAMLIT_HOST_PORT:-8501}:${STREAMLIT_CONTAINER_PORT:-8501}"
    volumes:
      - ./streamlit/app:/app/app:ro
      - ./src:/app/src:ro
      - ./models:/app/models:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - p13_network
    profiles:
      - streamlit

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_mlflow
    command: >
      mlflow server
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port ${MLFLOW_CONTAINER_PORT:-5000}
    ports:
      - "${MLFLOW_HOST_PORT:-5001}:${MLFLOW_CONTAINER_PORT:-5000}"
    volumes:
      - mlruns_data:/mlruns
    networks:
      - p13_network
    profiles:
      - mlflow

  jupyter:
    build:
      context: .
      dockerfile: docker/Dockerfile.jupyter
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_jupyter
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    ports:
      - "${JUPYTER_HOST_PORT:-8889}:${JUPYTER_CONTAINER_PORT:-8888}"
    volumes:
      - ./jupyter/notebooks:/app/notebooks
      - ./DATA:/data:ro
      - ./src:/app/src
      - ./models:/app/models
      - mlruns_data:/app/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - p13_network
    profiles:
      - jupyter

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-p13}_postgres_data
  mlruns_data:
    name: ${COMPOSE_PROJECT_NAME:-p13}_mlruns_data

networks:
  p13_network:
    driver: bridge
