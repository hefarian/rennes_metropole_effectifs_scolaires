# =============================================================================
# P13 — Estimation des effectifs scolaires (Rennes Métropole)
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - p13_network

  etl:
    build:
      context: .
      dockerfile: docker/Dockerfile.etl
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_etl
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATA_DIR: /data
    volumes:
      - ./DATA:/data:ro
      - ./src:/app/src:ro
      - ./database/scripts:/app/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - p13_network
    profiles:
      - etl

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_api
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MODELS_DIR: /app/models
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    ports:
      - "${API_HOST_PORT:-8000}:${API_CONTAINER_PORT:-8000}"
    volumes:
      - ./src:/app/src:ro
      - ./models:/app/models
      - mlruns_data:/app/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_CONTAINER_PORT:-8000}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p13_network

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_streamlit
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_URL: http://api:${API_CONTAINER_PORT:-8000}
    ports:
      - "${STREAMLIT_HOST_PORT:-8501}:${STREAMLIT_CONTAINER_PORT:-8501}"
    volumes:
      - ./streamlit/app:/app/app:ro
      - ./src:/app/src:ro
      - ./models:/app/models:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - p13_network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_mlflow
    command: >
      mlflow server
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port ${MLFLOW_CONTAINER_PORT:-5000}
    ports:
      - "${MLFLOW_HOST_PORT:-5001}:${MLFLOW_CONTAINER_PORT:-5000}"
    volumes:
      - mlruns_data:/mlruns
    networks:
      - p13_network

  jupyter:
    build:
      context: .
      dockerfile: docker/Dockerfile.jupyter
    container_name: ${COMPOSE_PROJECT_NAME:-p13}_jupyter
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    ports:
      - "${JUPYTER_HOST_PORT:-8889}:${JUPYTER_CONTAINER_PORT:-8888}"
    volumes:
      - ./jupyter/notebooks:/app/notebooks
      - ./DATA:/data:ro
      - ./src:/app/src
      - ./models:/app/models
      - mlruns_data:/app/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - p13_network

volumes:
  postgres_data:
  mlruns_data:

networks:
  p13_network:
    driver: bridge
