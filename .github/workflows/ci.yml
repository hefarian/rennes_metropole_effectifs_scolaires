name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-api.txt
          pip install pytest pytest-cov ruff nbformat

      - name: Lint
        run: ruff check src/ api/ database/scripts/ --ignore E402

      - name: Import check
        env:
          PYTHONPATH: src
        run: |
          python -c "from p13.config import COMMUNES_INSEE; print(len(COMMUNES_INSEE))"

      - name: Validate notebooks
        run: |
          python - <<'PY'
          from pathlib import Path
          import nbformat

          notebook_dir = Path("jupyter/notebooks")
          notebooks = sorted(notebook_dir.glob("*.ipynb"))
          if not notebooks:
              raise SystemExit("No notebooks found in jupyter/notebooks")

          for nb_path in notebooks:
              with nb_path.open("r", encoding="utf-8") as f:
                  nbformat.read(f, as_version=4)
              print(f"Validated {nb_path}")
          PY

      - name: Run tests with coverage
        env:
          PYTHONPATH: .:src
        run: |
          pytest tests/ \
            -v --tb=short \
            --cov=api \
            --cov=src/p13 \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: htmlcov/

      - name: Upload coverage XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build postgres api streamlit jupyter etl
